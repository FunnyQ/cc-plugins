<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="820" viewBox="0 0 1320 820" font-family="'Helvetica Neue', Arial, 'PingFang TC', 'Microsoft JhengHei', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBFDFE"/>
      <stop offset="1" stop-color="#ECF3F6"/>
    </linearGradient>
    <linearGradient id="runway" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#35CAD2" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#35CAD2" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#34A879" stop-opacity="0.18"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#21455A" flood-opacity="0.14"/>
    </filter>
    <marker id="ah-ink" markerWidth="11" markerHeight="11" refX="8" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L9,3 L0,6 Z" fill="#33485A"/></marker>
    <marker id="ah-teal" markerWidth="11" markerHeight="11" refX="8" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L9,3 L0,6 Z" fill="#1FA7B0"/></marker>
    <marker id="ah-green" markerWidth="11" markerHeight="11" refX="8" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L9,3 L0,6 Z" fill="#2F9C70"/></marker>
    <marker id="ah-amber" markerWidth="11" markerHeight="11" refX="8" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L9,3 L0,6 Z" fill="#D9852E"/></marker>
    <marker id="ah-red" markerWidth="11" markerHeight="11" refX="8" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L9,3 L0,6 Z" fill="#C9603F"/></marker>
    <style>
      .ink{fill:#1B2A36}.mut{fill:#5E7686}.wt{fill:#fff}
      .h1{font-size:26px;font-weight:700}
      .sub{font-size:13px}
      .ctitle{font-size:15px;font-weight:700}
      .ntitle{font-size:19px;font-weight:700}
      .role{font-size:13.5px}.role2{font-size:12.5px}
      .nlbl{font-size:13px;font-weight:600}.nsub{font-size:10.5px}
      .tag{font-size:11px;font-weight:600}
      .chip{font-size:12px;font-weight:600}
      .note{font-size:11.5px}
      .ln{stroke-width:2;fill:none}
    </style>
  </defs>

  <rect width="1320" height="820" fill="url(#bg)"/>

  <!-- Title -->
  <text class="h1 ink" x="60" y="48">Dispatch — the full arc from idea to ship</text>
  <text class="sub mut" x="61" y="74">preflight clarifies → flightplan writes the blueprint → autopilot executes (every task clears its rubric gate) → final review → ship</text>

  <!-- through-line behind top tier -->
  <rect x="60" y="166" width="1185" height="8" rx="4" fill="url(#runway)"/>

  <!-- ===== TOP TIER: the 3-skill arc ===== -->
  <!-- arrows between cards -->
  <line class="ln" x1="362" y1="170" x2="466" y2="170" stroke="#1FA7B0" marker-end="url(#ah-teal)"/>
  <line class="ln" x1="772" y1="170" x2="876" y2="170" stroke="#1FA7B0" marker-end="url(#ah-teal)"/>
  <line class="ln" x1="1182" y1="170" x2="1196" y2="170" stroke="#2F9C70" marker-end="url(#ah-green)"/>

  <!-- Card P: preflight -->
  <g filter="url(#soft)"><rect x="60" y="104" width="300" height="132" rx="14" fill="#fff" stroke="#D7E3EA"/></g>
  <rect x="60" y="104" width="6" height="132" rx="3" fill="#35CAD2"/>
  <circle cx="92" cy="138" r="15" fill="#35CAD2"/><text class="wt" font-size="14" font-weight="700" x="92" y="143" text-anchor="middle">1</text>
  <text class="ntitle ink" x="118" y="144">preflight</text>
  <rect x="118" y="156" width="86" height="20" rx="10" fill="#E6F6F7"/><text class="tag" fill="#1FA7B0" x="161" y="170" text-anchor="middle">light</text>
  <text class="role ink" x="80" y="202">Interview to clarify needs</text>
  <text class="role2 mut" x="80" y="223">→ one in-conversation plan, approve &amp; run</text>

  <!-- Card F: flightplan -->
  <g filter="url(#soft)"><rect x="470" y="104" width="300" height="132" rx="14" fill="#fff" stroke="#D7E3EA"/></g>
  <rect x="470" y="104" width="6" height="132" rx="3" fill="#35CAD2"/>
  <circle cx="502" cy="138" r="15" fill="#35CAD2"/><text class="wt" font-size="14" font-weight="700" x="502" y="143" text-anchor="middle">2</text>
  <text class="ntitle ink" x="528" y="144">flightplan</text>
  <rect x="528" y="156" width="92" height="20" rx="10" fill="#E6F6F7"/><text class="tag" fill="#1FA7B0" x="574" y="170" text-anchor="middle">heavy</text>
  <text class="role ink" x="490" y="202">Interview → blueprint to disk</text>
  <text class="role2 mut" x="490" y="223">→ PLAN.md + _context + tasks tree</text>

  <!-- Card A: autopilot -->
  <g filter="url(#soft)"><rect x="880" y="104" width="300" height="132" rx="14" fill="#fff" stroke="#D7E3EA"/></g>
  <rect x="880" y="104" width="6" height="132" rx="3" fill="#34A879"/>
  <circle cx="912" cy="138" r="15" fill="#34A879"/><text class="wt" font-size="14" font-weight="700" x="912" y="143" text-anchor="middle">3</text>
  <text class="ntitle ink" x="938" y="144">autopilot</text>
  <rect x="938" y="156" width="86" height="20" rx="10" fill="#E5F5EE"/><text class="tag" fill="#2F9C70" x="981" y="170" text-anchor="middle">auto</text>
  <text class="role ink" x="900" y="202">Auto-fly every task</text>
  <text class="role2 mut" x="900" y="223">→ each clears rubric → final review → ship</text>

  <!-- Ship -->
  <g filter="url(#soft)"><circle cx="1248" cy="170" r="46" fill="#fff" stroke="#34A879"/></g>
  <text font-size="26" x="1248" y="170" text-anchor="middle">🚀</text>
  <text class="nlbl" fill="#2F9C70" x="1248" y="200" text-anchor="middle">shipped</text>

  <!-- connectors from F and A down into the detail boxes -->
  <path class="ln" d="M620,236 L620,268 L310,268 L310,298" stroke="#1FA7B0" marker-end="url(#ah-teal)"/>
  <text class="note mut" x="330" y="262">writes</text>
  <path class="ln" d="M1030,236 L1030,268 L930,268 L930,298" stroke="#2F9C70" marker-end="url(#ah-green)"/>
  <text class="note mut" x="948" y="262">reads &amp; runs</text>

  <!-- ===== LEFT: flightplan artifact tree ===== -->
  <g filter="url(#soft)"><rect x="60" y="300" width="500" height="430" rx="14" fill="#fff" stroke="#D7E3EA"/></g>
  <text class="ctitle ink" x="84" y="334">flightplan's blueprint (self-contained task tree)</text>

  <rect x="84" y="350" width="240" height="34" rx="8" fill="#EAF1F4" stroke="#D2DFE6"/>
  <text class="chip ink" x="98" y="372">📄 PLAN.md — source of truth</text>
  <rect x="84" y="396" width="452" height="34" rx="8" fill="#EAF1F4" stroke="#D2DFE6"/>
  <text class="chip ink" x="98" y="418">📁 _context/ — shared.md · rubric.md (shared scale/dims)</text>

  <!-- bucket A -->
  <text class="note mut" x="86" y="456">tasks/&lt;bucket-a&gt;/</text>
  <g>
    <rect x="84" y="464" width="86" height="30" rx="8" fill="#EFF7F8" stroke="#BFE4E7"/><text class="chip ink" x="100" y="484">01 ⓡ</text>
    <rect x="178" y="464" width="86" height="30" rx="8" fill="#EFF7F8" stroke="#BFE4E7"/><text class="chip ink" x="194" y="484">02 ⓡ</text>
    <rect x="272" y="464" width="86" height="30" rx="8" fill="#EFF7F8" stroke="#BFE4E7"/><text class="chip ink" x="288" y="484">03 ⓡ</text>
  </g>
  <!-- bucket B -->
  <text class="note mut" x="86" y="520">tasks/&lt;bucket-b&gt;/</text>
  <g>
    <rect x="84" y="528" width="86" height="30" rx="8" fill="#EFF7F8" stroke="#BFE4E7"/><text class="chip ink" x="100" y="548">01 ⓡ</text>
    <rect x="178" y="528" width="86" height="30" rx="8" fill="#EFF7F8" stroke="#BFE4E7"/><text class="chip ink" x="194" y="548">02 ⓡ</text>
  </g>

  <!-- final review task -->
  <rect x="84" y="582" width="452" height="42" rx="9" fill="#FBF1E4" stroke="#E7C79B"/>
  <text class="chip" fill="#B5701E" x="100" y="608">🏁 final-review · Final review: true · depends on all tasks</text>

  <text class="note mut" x="84" y="652">ⓡ = task carries its ## Eval rubric (dims×weight + pass line + hard-fail)</text>
  <text class="note mut" x="84" y="672">lint enforces: every task has a rubric; final review covers all tasks</text>
  <text class="note mut" x="84" y="700">dependency graph sets order → next-ready finds tasks with all deps done</text>

  <!-- feed arrow tree -> loop -->
  <path class="ln" d="M540,470 L598,470" stroke="#2F9C70" marker-end="url(#ah-green)"/>
  <text class="note mut" x="544" y="461">ready</text>

  <!-- ===== RIGHT: autopilot per-task loop ===== -->
  <g filter="url(#soft)"><rect x="600" y="300" width="660" height="430" rx="14" fill="#fff" stroke="#D7E3EA"/></g>
  <text class="ctitle ink" x="624" y="334">autopilot — loop per ready task</text>
  <text class="note mut" x="624" y="354">next-ready finds tasks with all deps done ↻</text>

  <!-- pipeline nodes -->
  <rect x="628" y="378" width="120" height="54" rx="10" fill="#F4FBFB" stroke="#BFE4E7"/>
  <text class="nlbl ink" x="688" y="410" text-anchor="middle">Dev (implement)</text>
  <line class="ln" x1="750" y1="405" x2="788" y2="405" stroke="#33485A" marker-end="url(#ah-ink)"/>

  <rect x="790" y="378" width="168" height="54" rx="10" fill="#F4FBFB" stroke="#BFE4E7"/>
  <text class="nlbl ink" x="874" y="402" text-anchor="middle">Review</text>
  <text class="nsub mut" x="874" y="419" text-anchor="middle">judge scores each rubric dim</text>
  <line class="ln" x1="960" y1="405" x2="998" y2="405" stroke="#33485A" marker-end="url(#ah-ink)"/>

  <rect x="1000" y="378" width="150" height="54" rx="10" fill="#FBF1E4" stroke="#E7C79B"/>
  <text class="nlbl" fill="#B5701E" x="1075" y="402" text-anchor="middle">score-task gate</text>
  <text class="nsub" fill="#B5701E" x="1075" y="419" text-anchor="middle">weighted avg + hard-fail</text>

  <!-- score -> diamond -->
  <line class="ln" x1="1075" y1="432" x2="1075" y2="470" stroke="#33485A" marker-end="url(#ah-ink)"/>

  <!-- decision diamond -->
  <polygon points="1075,470 1138,508 1075,546 1012,508" fill="#fff" stroke="#9AB0BD"/>
  <text class="nlbl ink" x="1075" y="513" text-anchor="middle">pass?</text>

  <!-- fail -> feedback -> back to Dev -->
  <path class="ln" d="M1012,508 L688,508 L688,434" stroke="#C9603F" marker-end="url(#ah-red)"/>
  <text class="note" fill="#C9603F" x="724" y="500">fail → feedback ↺ (redo low-scoring dims)</text>

  <!-- pass -> done -->
  <line class="ln" x1="1075" y1="546" x2="1075" y2="576" stroke="#2F9C70" marker-end="url(#ah-green)"/>
  <rect x="1010" y="576" width="130" height="38" rx="9" fill="#E9F7F0" stroke="#A9DCC4"/>
  <text class="chip" fill="#2F9C70" x="1075" y="600" text-anchor="middle">Status: done ✓</text>
  <text class="note" fill="#2F9C70" x="1148" y="599">pass</text>

  <text class="note mut" x="624" y="566">loop has MAX_ATTEMPTS; on cap → needs_your_call hands back to you</text>

  <!-- all done -> final review -> ship -->
  <path class="ln" d="M1010,595 L900,595 L900,632" stroke="#33485A" marker-end="url(#ah-ink)"/>
  <text class="note mut" x="912" y="624">all tasks done</text>

  <rect x="624" y="636" width="300" height="46" rx="10" fill="#FBF1E4" stroke="#E7C79B"/>
  <text class="nlbl" fill="#B5701E" x="774" y="657" text-anchor="middle">🏁 Final review</text>
  <text class="nsub" fill="#B5701E" x="774" y="673" text-anchor="middle">integration · goal · consistency · no regressions</text>

  <line class="ln" x1="924" y1="659" x2="1006" y2="659" stroke="#2F9C70" marker-end="url(#ah-green)"/>
  <rect x="1008" y="636" width="140" height="46" rx="10" fill="#E9F7F0" stroke="#A9DCC4"/>
  <text class="nlbl" fill="#2F9C70" x="1078" y="664" text-anchor="middle">🚀 Ship</text>

  <!-- legend -->
  <text class="note mut" x="624" y="710">green = gate passed / ship · amber = rubric scoring / final review · red = failed, sent back</text>
</svg>
