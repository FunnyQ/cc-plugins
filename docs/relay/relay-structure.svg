<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 1110" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="relayTitle relayDesc">
  <title id="relayTitle">relay — 跨 harness 任務委派</title>
  <desc id="relayDesc">relay 插件兩層架構、能力矩陣與 DISPATCH 流程圖</desc>

  <defs>
    <!-- Fonts -->
    <style>
      .text { font-family: 'PingFang TC','Noto Sans TC','Microsoft JhengHei',system-ui,sans-serif; }
      .title { font-size: 32px; font-weight: 700; }
      .subtitle { font-size: 15px; font-weight: 400; }
      .section-label { font-size: 14px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
      .card-title { font-size: 16px; font-weight: 700; }
      .card-body { font-size: 13px; font-weight: 500; }
      .small { font-size: 12px; font-weight: 500; }
      .tiny { font-size: 11px; font-weight: 400; }
      .code { font-family: 'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace; font-size: 12px; }
      .matrix-head { font-size: 13px; font-weight: 700; }
      .matrix-cell { font-size: 13px; font-weight: 600; }
      .flow-text { font-size: 12px; font-weight: 600; }
      .legend-text { font-size: 12px; font-weight: 500; }
      .accent-mode { fill: #0f766e; }
      .accent-backend { fill: #4338ca; }
      .accent-strategy { fill: #b45309; }
      .white { fill: #ffffff; }
      .dark { fill: #1e293b; }
      .muted { fill: #64748b; }
    </style>

    <!-- Soft shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <filter id="shadow-sm" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>

    <!-- Arrowheads -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
    <marker id="arrow-mode" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0f766e"/>
    </marker>
    <marker id="arrow-backend" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4338ca"/>
    </marker>
    <marker id="arrow-strategy" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#b45309"/>
    </marker>

    <!-- Gradients -->
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="hero-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="50%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="mode-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdfa"/>
      <stop offset="100%" stop-color="#ccfbf1"/>
    </linearGradient>
    <linearGradient id="backend-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="strategy-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="1110" fill="url(#bg-grad)"/>

  <!-- Decorative top bar -->
  <rect x="0" y="0" width="1280" height="6" fill="url(#hero-grad)"/>

  <!-- Header -->
  <g transform="translate(80, 44)">
    <text x="0" y="0" class="text title dark">relay — 跨 harness 任務委派</text>
    <text x="0" y="32" class="text subtitle muted">讓任一 harness 的 agent 把任務丟給另一個 harness 的 CLI，實現跨後端任務委派</text>
  </g>

  <!-- Entry pill -->
  <g transform="translate(80, 106)">
    <rect x="0" y="0" width="486" height="44" rx="22" fill="#ffffff" filter="url(#shadow-sm)"/>
    <rect x="2" y="2" width="80" height="40" rx="20" fill="#1e293b"/>
    <text x="42" y="27" class="text small white" text-anchor="middle">指令入口</text>
    <text x="100" y="28" class="text code dark">/relay &lt;backend&gt; &lt;mode&gt; [task]</text>
    <text x="455" y="28" class="text tiny muted" text-anchor="end">backend ∈ codex / opencode / claude</text>
  </g>

  <!-- =========================================================
       TWO-LAYER ARCHITECTURE
       ========================================================= -->
  <g transform="translate(80, 176)">
    <!-- Section title -->
    <text x="0" y="0" class="text section-label accent-mode">兩層架構</text>

    <!-- 模式層 card -->
    <g transform="translate(0, 20)">
      <rect x="0" y="0" width="520" height="220" rx="16" fill="url(#mode-grad)" stroke="#99f6e4" stroke-width="1.5" filter="url(#shadow)"/>
      <rect x="0" y="0" width="6" height="220" rx="3" fill="#0f766e"/>
      <text x="26" y="38" class="text card-title accent-mode">模式層</text>
      <text x="92" y="38" class="text small muted">backend-agnostic / 與後端無關</text>

      <!-- inner cards -->
      <g transform="translate(26, 62)">
        <rect x="0" y="0" width="222" height="128" rx="12" fill="#ffffff" filter="url(#shadow-sm)"/>
        <text x="18" y="34" class="text card-title dark">relay-prompt.ts</text>
        <text x="18" y="60" class="text card-body muted">• prompt 組裝</text>
        <text x="18" y="84" class="text card-body muted">• smart-apply 政策</text>
        <text x="18" y="108" class="text card-body muted">• 報告格式輸出</text>
      </g>
      <g transform="translate(272, 62)">
        <rect x="0" y="0" width="222" height="128" rx="12" fill="#ffffff" filter="url(#shadow-sm)"/>
        <text x="18" y="34" class="text card-title dark">context-collector.ts</text>
        <text x="18" y="64" class="text card-body muted">收集與後端無關的</text>
        <text x="18" y="88" class="text card-body muted">通用 context</text>
      </g>
    </g>

    <!-- 後端層 card -->
    <g transform="translate(560, 20)">
      <rect x="0" y="0" width="560" height="220" rx="16" fill="url(#backend-grad)" stroke="#c7d2fe" stroke-width="1.5" filter="url(#shadow)"/>
      <rect x="0" y="0" width="6" height="220" rx="3" fill="#4338ca"/>
      <text x="26" y="38" class="text card-title accent-backend">後端層</text>
      <text x="96" y="38" class="text small muted">per-harness / 各 harness 一個</text>

      <!-- backend files -->
      <g transform="translate(26, 58)">
        <rect x="0" y="0" width="160" height="76" rx="10" fill="#ffffff" filter="url(#shadow-sm)"/>
        <text x="80" y="32" class="text card-title dark" text-anchor="middle">backends/codex.ts</text>
        <text x="80" y="56" class="text small muted" text-anchor="middle">invoke / parseOutput</text>
      </g>
      <g transform="translate(200, 58)">
        <rect x="0" y="0" width="160" height="76" rx="10" fill="#ffffff" filter="url(#shadow-sm)"/>
        <text x="80" y="32" class="text card-title dark" text-anchor="middle">backends/opencode.ts</text>
        <text x="80" y="56" class="text small muted" text-anchor="middle">invoke / parseOutput</text>
      </g>
      <g transform="translate(374, 58)">
        <rect x="0" y="0" width="160" height="76" rx="10" fill="#ffffff" filter="url(#shadow-sm)"/>
        <text x="80" y="32" class="text card-title dark" text-anchor="middle">backends/claude.ts</text>
        <text x="80" y="56" class="text small muted" text-anchor="middle">invoke / parseOutput</text>
      </g>

      <g transform="translate(26, 148)">
        <rect x="0" y="0" width="244" height="52" rx="10" fill="#ffffff" filter="url(#shadow-sm)"/>
        <text x="18" y="22" class="text card-title dark">gate.ts</text>
        <text x="18" y="42" class="text tiny muted">能力閘門 capabilityGate</text>
      </g>
      <g transform="translate(290, 148)">
        <rect x="0" y="0" width="244" height="52" rx="10" fill="#ffffff" filter="url(#shadow-sm)"/>
        <text x="18" y="22" class="text card-title dark">index.ts</text>
        <text x="18" y="42" class="text tiny muted">registry 組裝</text>
      </g>
    </g>

    <!-- strategy axis banner -->
    <g transform="translate(0, 260)">
      <rect x="0" y="0" width="1120" height="64" rx="12" fill="url(#strategy-grad)" stroke="#fde68a" stroke-width="1.5" filter="url(#shadow-sm)"/>
      <text x="24" y="25" class="text card-title accent-strategy">strategy 軸</text>
      <text x="24" y="48" class="text small muted">每個後端實作 strategy()，決定採用 native 或 prompt 路徑</text>

      <g transform="translate(560, 14)">
        <rect x="0" y="0" width="180" height="36" rx="18" fill="#ffffff" stroke="#fbbf24" stroke-width="1.5"/>
        <circle cx="22" cy="18" r="6" fill="#f59e0b"/>
        <text x="44" y="23" class="text small dark">native</text>
        <text x="100" y="23" class="text tiny muted">後端原生指令</text>
      </g>
      <g transform="translate(760, 14)">
        <rect x="0" y="0" width="180" height="36" rx="18" fill="#ffffff" stroke="#fbbf24" stroke-width="1.5"/>
        <circle cx="22" cy="18" r="6" fill="#f59e0b"/>
        <text x="44" y="23" class="text small dark">prompt</text>
        <text x="105" y="23" class="text tiny muted">消費組好的 prompt 檔</text>
      </g>
      <text x="960" y="28" class="text tiny muted">native 自行抓 git context；prompt 吃組裝結果</text>
    </g>
  </g>

  <!-- =========================================================
       CAPABILITY MATRIX
       ========================================================= -->
  <g transform="translate(80, 536)">
    <text x="0" y="0" class="text section-label accent-backend">能力矩陣</text>
    <g transform="translate(0, 18)">
      <rect x="0" y="0" width="420" height="184" rx="14" fill="#ffffff" filter="url(#shadow)"/>

      <!-- Table header -->
      <rect x="16" y="16" width="140" height="34" rx="8" fill="#f1f5f9"/>
      <rect x="164" y="16" width="74" height="34" rx="8" fill="#eef2ff"/>
      <rect x="246" y="16" width="74" height="34" rx="8" fill="#eef2ff"/>
      <rect x="328" y="16" width="74" height="34" rx="8" fill="#eef2ff"/>
      <text x="86" y="38" class="text matrix-head dark" text-anchor="middle">模式 mode</text>
      <text x="201" y="38" class="text matrix-head accent-backend" text-anchor="middle">codex</text>
      <text x="283" y="38" class="text matrix-head accent-backend" text-anchor="middle">opencode</text>
      <text x="365" y="38" class="text matrix-head accent-backend" text-anchor="middle">claude</text>

      <!-- Row 1 -->
      <text x="86" y="74" class="text matrix-cell dark" text-anchor="middle">delegate 委派</text>
      <text x="201" y="74" class="text matrix-cell accent-mode" text-anchor="middle">✓ prompt</text>
      <text x="283" y="74" class="text matrix-cell accent-mode" text-anchor="middle">✓ prompt</text>
      <text x="365" y="74" class="text matrix-cell accent-mode" text-anchor="middle">✓ prompt</text>

      <!-- Row 2 -->
      <text x="86" y="108" class="text matrix-cell dark" text-anchor="middle">review 審查</text>
      <text x="201" y="108" class="text matrix-cell accent-backend" text-anchor="middle">✓ native</text>
      <text x="283" y="108" class="text matrix-cell" text-anchor="middle" fill="#b45309">⚠ 模擬→prompt</text>
      <text x="365" y="108" class="text matrix-cell accent-backend" text-anchor="middle">✓ native</text>

      <!-- Row 3 -->
      <text x="86" y="142" class="text matrix-cell dark" text-anchor="middle">image 生圖</text>
      <text x="201" y="142" class="text matrix-cell accent-backend" text-anchor="middle">✓</text>
      <text x="283" y="142" class="text matrix-cell" text-anchor="middle" fill="#94a3b8">✗</text>
      <text x="365" y="142" class="text matrix-cell" text-anchor="middle" fill="#94a3b8">✗</text>
      <text x="16" y="172" class="text tiny muted">（image 僅 codex 支援：gpt-image-2）</text>
    </g>
  </g>

  <!-- =========================================================
       DISPATCH FLOW
       ========================================================= -->
  <g transform="translate(80, 754)">
    <text x="0" y="0" class="text section-label" style="fill:#0f766e;">DISPATCH 流程</text>

    <g transform="translate(0, 22)">
      <rect x="0" y="0" width="1120" height="308" rx="16" fill="#ffffff" filter="url(#shadow)"/>

      <g transform="translate(28, 28)">
        <!-- Row A: 解析參數 → capabilityGate → resolveModel → 問 strategy -->
        <rect x="0" y="0" width="104" height="46" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
        <text x="52" y="28" class="text flow-text dark" text-anchor="middle">解析參數</text>
        <line x1="104" y1="23" x2="132" y2="23" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

        <rect x="138" y="0" width="140" height="46" rx="10" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.5"/>
        <text x="208" y="28" class="text flow-text dark" text-anchor="middle">capabilityGate</text>
        <text x="208" y="64" class="text tiny muted" text-anchor="middle">擋掉不支援組合</text>
        <line x1="278" y1="23" x2="306" y2="23" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

        <rect x="312" y="0" width="112" height="46" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
        <text x="368" y="28" class="text flow-text dark" text-anchor="middle">resolveModel</text>
        <line x1="424" y1="23" x2="452" y2="23" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

        <rect x="458" y="0" width="96" height="46" rx="10" fill="#fffbeb" stroke="#fbbf24" stroke-width="1.5"/>
        <text x="506" y="28" class="text flow-text accent-strategy" text-anchor="middle">問 strategy</text>

        <!-- Fork down to the two mutually-exclusive strategy boxes -->
        <line x1="506" y1="46" x2="506" y2="72" stroke="#b45309" stroke-width="2"/>
        <line x1="455" y1="72" x2="635" y2="72" stroke="#b45309" stroke-width="2"/>
        <line x1="455" y1="72" x2="455" y2="90" stroke="#b45309" stroke-width="2" marker-end="url(#arrow-strategy)"/>
        <line x1="635" y1="72" x2="635" y2="90" stroke="#b45309" stroke-width="2" marker-end="url(#arrow-strategy)"/>

        <rect x="380" y="92" width="150" height="46" rx="10" fill="#f0fdfa" stroke="#14b8a6" stroke-width="1.5"/>
        <text x="455" y="120" class="text flow-text accent-mode" text-anchor="middle">buildPromptFile</text>

        <rect x="560" y="92" width="150" height="46" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
        <text x="635" y="120" class="text flow-text accent-backend" text-anchor="middle">scope + focus</text>

        <!-- Merge the two branches, then sweep left into backend.invoke (row B) -->
        <line x1="455" y1="138" x2="455" y2="170" stroke="#14b8a6" stroke-width="2"/>
        <line x1="635" y1="138" x2="635" y2="170" stroke="#6366f1" stroke-width="2"/>
        <line x1="455" y1="170" x2="635" y2="170" stroke="#475569" stroke-width="2"/>
        <line x1="545" y1="170" x2="545" y2="186" stroke="#475569" stroke-width="2"/>
        <line x1="64" y1="186" x2="545" y2="186" stroke="#475569" stroke-width="2"/>
        <line x1="64" y1="186" x2="64" y2="204" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

        <!-- Row B: backend.invoke → spawn CLI → parseOutput → postRun → 輸出 -->
        <rect x="0" y="206" width="128" height="46" rx="10" fill="#eef2ff" stroke="#818cf8" stroke-width="1.5"/>
        <text x="64" y="234" class="text flow-text accent-backend" text-anchor="middle">backend.invoke</text>
        <line x1="128" y1="229" x2="206" y2="229" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

        <rect x="212" y="206" width="104" height="46" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
        <text x="264" y="234" class="text flow-text dark" text-anchor="middle">spawn CLI</text>
        <line x1="316" y1="229" x2="394" y2="229" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

        <rect x="400" y="206" width="118" height="46" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
        <text x="459" y="234" class="text flow-text dark" text-anchor="middle">parseOutput</text>
        <line x1="518" y1="229" x2="596" y2="229" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

        <rect x="602" y="206" width="136" height="46" rx="10" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.5"/>
        <text x="670" y="234" class="text flow-text dark" text-anchor="middle">postRun</text>
        <text x="670" y="270" class="text tiny muted" text-anchor="middle">codex 生圖搬 PNG</text>
        <line x1="738" y1="229" x2="816" y2="229" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

        <rect x="822" y="200" width="250" height="64" rx="12" fill="#0f766e" filter="url(#shadow-sm)"/>
        <text x="947" y="224" class="text card-title white" text-anchor="middle">輸出</text>
        <text x="947" y="244" class="text small white" text-anchor="middle">全文 stdout ＋ 永久存檔</text>
        <text x="947" y="259" class="text tiny" style="fill:#ccfbf1;" text-anchor="middle">/tmp/relay/&lt;ts&gt;/last.md</text>
      </g>
    </g>
  </g>

  <!-- =========================================================
       LEGEND
       ========================================================= -->
  <g transform="translate(540, 536)">
    <text x="0" y="0" class="text section-label muted">圖例</text>
    <g transform="translate(0, 18)">
      <rect x="0" y="0" width="360" height="156" rx="14" fill="#ffffff" filter="url(#shadow-sm)"/>

      <g transform="translate(20, 24)">
        <circle cx="10" cy="10" r="6" fill="#f59e0b"/>
        <text x="26" y="15" class="text legend-text dark">native</text>
        <text x="90" y="15" class="text tiny muted">後端使用自己的原生指令</text>
      </g>
      <g transform="translate(20, 56)">
        <circle cx="10" cy="10" r="6" fill="#14b8a6"/>
        <text x="26" y="15" class="text legend-text dark">prompt</text>
        <text x="96" y="15" class="text tiny muted">消費模式層組好的 prompt 檔</text>
      </g>
      <g transform="translate(20, 88)">
        <text x="0" y="14" class="text legend-text dark">✓ 支援</text>
        <text x="80" y="14" class="text legend-text" fill="#b45309">⚠ 模擬支援</text>
        <text x="190" y="14" class="text legend-text" fill="#94a3b8">✗ 不支援</text>
      </g>
      <g transform="translate(20, 120)">
        <rect x="0" y="0" width="20" height="12" rx="4" fill="#0f766e"/>
        <text x="30" y="11" class="text tiny muted">模式層 accent</text>
        <rect x="130" y="0" width="20" height="12" rx="4" fill="#4338ca"/>
        <text x="160" y="11" class="text tiny muted">後端層 accent</text>
        <rect x="260" y="0" width="20" height="12" rx="4" fill="#b45309"/>
        <text x="290" y="11" class="text tiny muted">strategy accent</text>
      </g>
    </g>
  </g>

  <!-- bottom decoration -->
  <rect x="0" y="1104" width="1280" height="6" fill="url(#hero-grad)"/>
</svg>
