<!doctype html>
<html lang="en" data-theme="night">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cockpit · Night Flight Deck</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="app" v-scope v-cloak>
      <!-- VIEWPORT — HUD over a forward warp; click to raise the barrier -->
      <header
        class="viewport"
        :class="{ 'is-idle': !selectedSessionId, 'is-collapsed': heroCollapsed, 'is-awaiting': awaitingCall }"
        role="button"
        tabindex="0"
        :aria-expanded="heroCollapsed ? 'false' : 'true'"
        :aria-label="heroCollapsed ? 'Lower viewport barrier' : 'Raise viewport barrier'"
        :title="heroCollapsed ? 'Lower barrier' : 'Raise barrier'"
        @click="toggleHero()"
        @keydown="onHeroKeydown($event)"
      >
        <canvas class="viewport__warp" aria-hidden="true"></canvas>
        <div class="viewport__nebula" aria-hidden="true"></div>
        <div class="viewport__barrier" aria-hidden="true"></div>
        <svg class="viewport__lead" aria-hidden="true">
          <line class="lead-underline" />
          <line class="lead-connector" />
        </svg>
        <div class="viewport__beacon" aria-hidden="true">
          <span class="viewport__beacon-ring"></span>
          <span class="viewport__beacon-core"></span>
        </div>

        <div class="hud">
          <div class="hud__alert" v-show="awaitingCall">
            <span class="status-led waiting"></span>
            <span class="hud__alert-text">Awaiting your call</span>
          </div>
          <div class="hud__heading">
            <span class="hud__tag">◢ Heading</span>
            <span
              class="viewport__project"
              v-text="selectedProjectName || 'No flight selected'"
            ></span>
          </div>
          <p
            class="viewport__destination"
            v-text="selectedSessionGoal || selectedProjectGoal || 'Select a session to begin'"
          ></p>

          <div class="hud__telemetry" aria-hidden="true">
            <span class="readout">SES</span>
            <span class="readout" v-text="sessionShortId"></span>
            <span class="hud__dot">·</span>
            <span class="readout" v-text="selectedProviderLabel"></span>
            <span class="hud__dot">·</span>
            <span
              class="readout"
              v-text="projectGroups.length + ' FLIGHTS'"
            ></span>
          </div>
        </div>
      </header>

      <button
        class="design-toggle"
        type="button"
        :aria-expanded="designSystemOpen ? 'true' : 'false'"
        aria-controls="design-system-panel"
        @click="toggleDesignSystem()"
      >
        <span class="design-toggle__mark" aria-hidden="true">
          <span></span><span></span><span></span><span></span>
        </span>
        <span class="design-toggle__label">Design</span>
      </button>

      <!-- MANIFEST — collapsed by default; the viewport already names the flight -->
      <nav class="manifest" :class="{ 'is-open': manifestOpen }">
        <button
          class="manifest__bar"
          type="button"
          :aria-expanded="manifestOpen ? 'true' : 'false'"
          @click="toggleManifest()"
        >
          <span class="manifest__legend">Projects</span>
          <span
            class="manifest__beacon"
            :class="{ 'is-open': manifestOpen }"
            aria-hidden="true"
          ></span>
          <span
            class="manifest__count readout"
            v-text="projectGroups.length + ' flights'"
          ></span>
        </button>

        <ul class="manifest__flights">
          <template v-for="g in projectGroups" :key="g.project">
            <li
              class="flight"
              :class="{ 'is-collapsed': !isProjectExpanded(g) }"
            >
              <div class="flight__head">
                <button
                  class="flight__toggle"
                  type="button"
                  @click="toggleProject(g)"
                >
                  <span
                    class="flight__caret"
                    v-text="isProjectExpanded(g) ? '▾' : '▸'"
                  ></span>
                  <span class="flight__name" v-text="g.name"></span>
                </button>
                <span class="flight__counts">
                  <span
                    class="status-led"
                    :class="g.activeCount ? 'active' : 'ended'"
                  ></span>
                  <span
                    class="readout"
                    v-text="g.activeCount + '/' + g.sessionCount"
                  ></span>
                </span>
                <button
                  class="flight__info"
                  type="button"
                  title="Project info"
                  aria-label="Project info"
                  @click.stop="openInfo(g)"
                >
                  ⓘ
                </button>
              </div>
              <ul class="flight__legs" v-show="isProjectExpanded(g)">
                <template v-for="s in g.sessions" :key="s.sessionId">
                  <li
                    class="leg"
                    :class="{ 'is-selected': isSelected(s), 'is-ended': s.status === 'ended' }"
                    @click="selectSession(s)"
                  >
                    <span class="status-led" :class="s.status"></span>
                    <span
                      class="provider-badge"
                      :class="'provider-badge--' + (s.provider || 'claude')"
                      v-text="(s.provider || 'claude').toUpperCase()"
                    ></span>
                    <span class="leg__goal" v-text="shortGoal(s)"></span>
                  </li>
                </template>
              </ul>
            </li>
          </template>
          <li v-if="loaded && !sessions.length" class="manifest__empty">
            No sessions registered.
          </li>
        </ul>
      </nav>

      <!-- INSTRUMENTS — two display screens: comms feed + flight log -->
      <main class="instruments">
        <section class="instrument" id="col-transcript">
          <header class="instrument__head">
            <span class="instrument__legend">Live Transcript</span>
          </header>
          <div class="instrument__body" data-column="transcript">
            <p class="placeholder">No live transcript.</p>
          </div>
        </section>

        <section class="instrument" id="col-decision">
          <header class="instrument__head">
            <span class="instrument__legend">Decision Log</span>
          </header>
          <div class="instrument__body" data-column="decision">
            <p class="placeholder">No decisions logged yet.</p>
          </div>
        </section>
      </main>

      <div class="info-modal" v-show="infoModalProject" @click="closeInfo()">
        <div
          class="info-modal__dialog"
          role="dialog"
          aria-modal="true"
          @click.stop
        >
          <header class="info-modal__header">
            <span class="info-modal__legend">Project Info</span>
            <span class="info-modal__name" v-text="infoModalName"></span>
            <button
              class="info-modal__close"
              type="button"
              aria-label="Close"
              @click="closeInfo()"
            >
              ✕
            </button>
          </header>
          <div class="info-modal__body" data-column="info">
            <p class="placeholder">Project goal, meta &amp; instructions.</p>
          </div>
        </div>
      </div>

      <aside
        id="design-system-panel"
        class="design-panel"
        :class="{ 'is-open': designSystemOpen }"
        v-show="designSystemOpen"
        aria-label="Design system"
        :aria-hidden="designSystemOpen ? 'false' : 'true'"
      >
        <header class="design-panel__header">
          <span class="design-panel__legend">Cockpit System</span>
          <button
            class="design-panel__close"
            type="button"
            aria-label="Close design system"
            @click="closeDesignSystem()"
          >
            ✕
          </button>
        </header>
        <div class="design-panel__body" data-column="design-system">
          <p class="placeholder">Design tokens and component rules.</p>
        </div>
      </aside>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
